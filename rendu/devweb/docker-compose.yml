services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      # URL du serveur d'inference INFRA. host.docker.internal = machine hote.
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
